<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Chatbot</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<div class="container-fluid h-100">
    <div class="row justify-content-center h-100">

     <div class="col-12 col-md-11 col-lg-10 col-xl-8 chat">

            <div class="card">

                <!-- Header -->
                <div class="card-header msg_head">
                    <div class="d-flex bd-highlight">

                        <div class="img_cont">
                            <img src="{{ url_for('static', filename='medicalbot.png') }}"
                                 class="rounded-circle user_img">
                            <span class="online_icon"></span>
                        </div>

                        <div class="user_info">
                            <span>Medical Chatbot</span>
                            <p>Ask me anything!</p>
                        </div>

                    </div>
                </div>

                <!-- Messages -->
                <div id="messageFormeight" class="card-body msg_card_body">
                </div>

                <!-- Footer -->
                <div class="card-footer">
                    <form id="messageArea" class="input-group">

                        <input type="text"
                               id="text"
                               name="msg"
                               placeholder="Type your message..."
                               autocomplete="off"
                               class="form-control type_msg"
                               required>

                        <div class="input-group-append">
                            <button type="submit"
                                    id="send"
                                    class="input-group-text send_btn">
                                <i class="fas fa-location-arrow"></i>
                            </button>
                        </div>

                    </form>
                </div>

            </div>

        </div>

    </div>
</div>

<script>
$(document).ready(function () {

    $("#messageArea").on("submit", function (event) {

        event.preventDefault();

        const date = new Date();
        const str_time =
            date.getHours() + ":" +
            ("0" + date.getMinutes()).slice(-2);

        var rawText = $("#text").val();

        var userHtml =
            '<div class="d-flex justify-content-end mb-4">' +
                '<div class="msg_cotainer_send">' +
                    rawText +
                    '<span class="msg_time_send">' +
                    str_time +
                    '</span>' +
                '</div>' +
                '<div class="img_cont_msg">' +
                    '<img src="/static/user.png" class="rounded-circle user_img_msg">' +
                '</div>' +
            '</div>';

        $("#text").val("");
        $("#messageFormeight").append(userHtml);

        $.ajax({
            data: {
                msg: rawText
            },
            type: "POST",
            url: "/get"
        }).done(function (data) {

            var botHtml =
                '<div class="d-flex justify-content-start mb-4">' +
                    '<div class="img_cont_msg">' +
                        '<img src="/static/medicalbot.png" class="rounded-circle user_img_msg">' +
                    '</div>' +
                    '<div class="msg_cotainer">' +
                        data +
                        '<span class="msg_time">' +
                        str_time +
                        '</span>' +
                    '</div>' +
                '</div>';

            $("#messageFormeight").append(botHtml);

            $("#messageFormeight").scrollTop(
                $("#messageFormeight")[0].scrollHeight
            );
        });

    });

});
</script>

</body>
</html>
